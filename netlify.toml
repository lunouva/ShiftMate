[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Environment secrets live in the Netlify dashboard:
  #   - VITE_APP_DOMAIN
  #   - VITE_API_BASE
  #   - VITE_ENABLE_DEMO
  #   - VITE_SHOW_BACKEND_SETTINGS
  #   - VITE_SHOW_DEMO_CONTROLS

# Note: For subdomain routing to work (*.shiftway.app), you must:
# 1. Configure a wildcard DNS record (*.shiftway.app CNAME shiftway.netlify.app)
# 2. Add the wildcard domain alias in Netlify Domain Settings
# 3. This catch-all redirect handles routing to the SPA for both root and subdomains

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
